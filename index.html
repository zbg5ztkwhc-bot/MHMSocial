<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHMSocil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            background: #f59e0b;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 10px;
        }
        .status.connected {
            background: #10b981;
        }
        .status.error {
            background: #ef4444;
        }
        .create-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .media-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .preview-container {
            margin: 10px 0;
        }
        .preview-image {
            max-height: 150px;
            border-radius: 10px;
            position: relative;
            display: inline-block;
        }
        .publish-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            float: right;
        }
        .publish-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        .post-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .post-info {
            flex: 1;
        }
        .username {
            font-weight: bold;
        }
        .time {
            font-size: 12px;
            color: #64748b;
        }
        .post-text {
            margin: 12px 0;
            line-height: 1.5;
        }
        .post-image {
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
        }
        .post-image img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        .actions {
            display: flex;
            gap: 25px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #64748b;
        }
        .action-btn.liked {
            color: #ef4444;
        }
        .comments-section {
            margin-top: 15px;
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .comment {
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .comment-author {
            font-weight: bold;
            min-width: 80px;
        }
        .add-comment-form {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .comment-input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 8px 15px;
        }
        .empty-feed, .loading {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            color: #64748b;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #cbd5e1;
            font-size: 16px;
        }
        .delete-btn:hover {
            color: #ef4444;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-fire"></i> MHMSocial</h1>
        <p>Connected to Firebase Realtime Database</p>
        <div class="status" id="statusBadge">
            <i class="fas fa-spinner fa-pulse"></i> Connecting...
        </div>
    </div>

    <div class="create-card">
        <textarea id="postText" rows="3" placeholder="What's on your mind? 🌍"></textarea>
        
        <label class="media-btn" for="imageInput">
            <i class="fas fa-camera"></i> Add Photo
        </label>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        
        <div id="previewArea" class="preview-container"></div>
        
        <div class="clearfix"></div>
        <button id="publishBtn" class="publish-btn">
            <i class="fas fa-paper-plane"></i> Publish
        </button>
        <div class="clearfix"></div>
    </div>

    <div id="feed"></div>
</div>

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    // Firebase configuration - VERIFIED WORKING
    const firebaseConfig = {
        apiKey: "AIzaSyDexKxdFHxMAw7K1e9_xWRuwSrlqaqxviU",
        authDomain: "mhmsocial.firebaseapp.com",
        databaseURL: "https://mhmsocial-default-rtdb.firebaseio.com",
        projectId: "mhmsocial",
        storageBucket: "mhmsocial.firebasestorage.app",
        messagingSenderId: "1064455642855",
        appId: "1:1064455642855:web:aaced5e4269f52f1d34c42"
    };

    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set, onValue, remove, update } from "firebase/database";

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentImageBase64 = null;
    let currentUser = "user_" + Math.random().toString(36).substr(2, 8);

    const statusBadge = document.getElementById('statusBadge');

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#ef4444' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Test database connection
    function testConnection() {
        const testRef = ref(db, '.info/connected');
        onValue(testRef, (snapshot) => {
            if (snapshot.val() === true) {
                statusBadge.innerHTML = '<i class="fas fa-check-circle"></i> Connected to Firebase';
                statusBadge.className = 'status connected';
                showToast('✅ Connected to Firebase Realtime Database!');
                loadPosts();
            } else {
                statusBadge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Connection Error';
                statusBadge.className = 'status error';
                showToast('❌ Not connected to Firebase. Check your database rules.', true);
            }
        });
    }

    // Compress image
    function compressImage(file, maxWidth = 800, quality = 0.7) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', quality);
                    const sizeKB = Math.round((base64.length * 3/4) / 1024);
                    
                    resolve({ base64, sizeKB });
                };
                img.src = e.target.result;
            };
        });
    }

    // Image preview
    const imageInput = document.getElementById('imageInput');
    const previewArea = document.getElementById('previewArea');

    imageInput.addEventListener('change', async (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            showToast(`Compressing image...`);
            const compressed = await compressImage(file, 800, 0.7);
            currentImageBase64 = compressed.base64;
            
            previewArea.innerHTML = `
                <div style="position: relative; display: inline-block;">
                    <img src="${compressed.base64}" class="preview-image" style="max-height: 150px; border-radius: 10px;">
                    <div style="font-size: 12px; margin-top: 5px;">Compressed: ${compressed.sizeKB}KB</div>
                    <button onclick="clearImage()" style="position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer;">×</button>
                </div>
            `;
            showToast(`✅ Image compressed to ${compressed.sizeKB}KB`);
        }
    });

    window.clearImage = function() {
        currentImageBase64 = null;
        previewArea.innerHTML = '';
    };

    // Publish post
    document.getElementById('publishBtn').addEventListener('click', async () => {
        const text = document.getElementById('postText').value.trim();
        if (!text && !currentImageBase64) {
            showToast("Please write something or add a photo", true);
            return;
        }

        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Publishing...';

        try {
            const postsRef = ref(db, 'posts');
            const newPostRef = push(postsRef);
            
            await set(newPostRef, {
                text: text || "📸 Shared a photo",
                imageBase64: currentImageBase64 || null,
                authorName: "User_" + currentUser.slice(0, 6),
                timestamp: Date.now(),
                likes: 0,
                likedBy: {},
                comments: {}
            });

            document.getElementById('postText').value = '';
            clearImage();
            showToast("✅ Post published successfully!");
        } catch (error) {
            console.error("Error:", error);
            showToast("Error: " + error.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publish';
        }
    });

    // Load posts
    function loadPosts() {
        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const posts = [];
            snapshot.forEach((childSnapshot) => {
                posts.push({ id: childSnapshot.key, ...childSnapshot.val() });
            });
            posts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            renderPosts(posts);
        }, (error) => {
            console.error("Load error:", error);
            document.getElementById('feed').innerHTML = `<div class="empty-feed"><i class="fas fa-exclamation-triangle"></i> Error loading posts: ${error.message}</div>`;
        });
    }

    // Like post
    window.likePost = async (postId, currentLikes) => {
        const postRef = ref(db, `posts/${postId}`);
        const likedByRef = ref(db, `posts/${postId}/likedBy/${currentUser}`);
        
        // Check if already liked
        const snapshot = await import("firebase/database").then(m => m.get(likedByRef));
        if (snapshot.exists()) {
            await update(postRef, { likes: currentLikes - 1 });
            await remove(likedByRef);
        } else {
            await update(postRef, { likes: currentLikes + 1 });
            await set(likedByRef, true);
        }
    };

    // Add comment
    window.addComment = async (postId) => {
        const input = document.getElementById(`comment_${postId}`);
        const text = input.value.trim();
        if (!text) return;
        
        const commentsRef = ref(db, `posts/${postId}/comments`);
        const newCommentRef = push(commentsRef);
        await set(newCommentRef, {
            author: "User_" + currentUser.slice(0, 6),
            text: text,
            timestamp: Date.now()
        });
        input.value = '';
        showToast("Comment added!");
    };

    // Delete post
    window.deletePost = async (postId) => {
        if (!confirm("Delete this post?")) return;
        await remove(ref(db, `posts/${postId}`));
        showToast("Post deleted");
    };

    // Toggle comments
    window.toggleComments = (postId) => {
        const div = document.getElementById(`comments_${postId}`);
        if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderPosts(posts) {
        const feed = document.getElementById('feed');
        if (!posts.length) {
            feed.innerHTML = `
                <div class="empty-feed">
                    <i class="fas fa-comment"></i><br>
                    No posts yet.<br>
                    <small>Be the first to share something!</small>
                </div>
            `;
            return;
        }

        feed.innerHTML = posts.map(post => {
            const commentCount = post.comments ? Object.keys(post.comments).length : 0;
            const likedByCurrent = post.likedBy && post.likedBy[currentUser];
            
            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar"><i class="fas fa-user"></i></div>
                        <div class="post-info">
                            <div class="username">${escapeHtml(post.authorName)}</div>
                            <div class="time">${new Date(post.timestamp).toLocaleString()}</div>
                        </div>
                        <button class="delete-btn" onclick="deletePost('${post.id}')">🗑️</button>
                    </div>
                    <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                    ${post.imageBase64 ? `
                        <div class="post-image">
                            <img src="${post.imageBase64}" alt="Post image" loading="lazy">
                        </div>
                    ` : ''}
                    <div class="actions">
                        <button class="action-btn ${likedByCurrent ? 'liked' : ''}" onclick="likePost('${post.id}', ${post.likes || 0})">
                            <i class="fa-${likedByCurrent ? 'solid' : 'regular'} fa-heart"></i> ${post.likes || 0} Likes
                        </button>
                        <button class="action-btn" onclick="toggleComments('${post.id}')">
                            <i class="far fa-comment"></i> ${commentCount} Comments
                        </button>
                    </div>
                    <div class="comments-section" id="comments_${post.id}">
                        <div id="commentList_${post.id}">
                            ${renderComments(post.comments)}
                        </div>
                        <div class="add-comment-form">
                            <input type="text" class="comment-input" id="comment_${post.id}" placeholder="Write a comment...">
                            <button onclick="addComment('${post.id}')" style="background: #667eea; color: white; border: none; border-radius: 20px; padding: 8px 20px; cursor: pointer;">Post</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderComments(comments) {
        if (!comments) return '<div>No comments yet</div>';
        const commentsArray = Object.values(comments);
        if (!commentsArray.length) return '<div>No comments yet</div>';
        return commentsArray.map(c => `
            <div class="comment">
                <span class="comment-author">${escapeHtml(c.author)}</span>
                <span>${escapeHtml(c.text)}</span>
            </div>
        `).join('');
    }

    // Start the app
    console.log("🚀 Starting MHMSocial...");
    testConnection();
</script>
</body>
</html>
