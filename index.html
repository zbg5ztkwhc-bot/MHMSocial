<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MHMSocial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .status {
            display: inline-block;
            background: #f59e0b;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 10px;
        }
        .status.connected {
            background: #10b981;
        }
        .status.error {
            background: #ef4444;
        }
        .create-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .create-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        textarea {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .media-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .media-btn:hover {
            background: #e2e8f0;
        }
        .preview-container {
            margin: 10px 0;
        }
        .preview-image {
            max-height: 150px;
            border-radius: 10px;
            position: relative;
            display: inline-block;
        }
        .publish-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            float: right;
        }
        .publish-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        .post-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .post-info {
            flex: 1;
        }
        .username {
            font-weight: bold;
            font-size: 16px;
        }
        .time {
            font-size: 11px;
            color: #64748b;
        }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #cbd5e1;
            font-size: 16px;
            padding: 5px;
        }
        .delete-btn:hover {
            color: #ef4444;
        }
        .post-text {
            margin: 12px 0;
            line-height: 1.5;
            word-break: break-word;
        }
        .post-image {
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            background: #f8fafc;
        }
        .post-image img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        .image-size {
            font-size: 11px;
            color: #64748b;
            margin-top: 5px;
        }
        .actions {
            display: flex;
            gap: 25px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #64748b;
            font-size: 14px;
        }
        .action-btn:hover {
            color: #667eea;
        }
        .action-btn.liked {
            color: #ef4444;
        }
        .comments-section {
            margin-top: 15px;
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            display: none;
        }
        .comment {
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .comment-author {
            font-weight: bold;
            min-width: 80px;
            color: #667eea;
        }
        .add-comment-form {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .comment-input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 8px 15px;
            font-family: inherit;
        }
        .empty-feed, .loading {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            color: #64748b;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .compress-options {
            background: #f0fdf4;
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            font-size: 13px;
        }
        .compress-options label {
            margin-right: 15px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-fire"></i> MHMSocial</h1>
        <p>Share posts with compressed images • Live Realtime Database</p>
        <div class="status" id="statusBadge">
            <i class="fas fa-spinner fa-pulse"></i> Connecting...
        </div>
    </div>

    <div class="create-card">
        <div class="create-header">
            <div class="avatar"><i class="fas fa-user-astronaut"></i></div>
            <div>
                <h3>Create a post</h3>
                <small>Add text, upload compressed photos, or both</small>
            </div>
        </div>
        
        <textarea id="postText" rows="3" placeholder="What's on your mind? 🌍"></textarea>
        
        <label class="media-btn" for="imageInput">
            <i class="fas fa-camera"></i> Add Photo
        </label>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        
        <div class="compress-options">
            <span style="font-weight: 500;">📸 Compression: </span>
            <label>
                <input type="radio" name="quality" value="high" checked> High (800px)
            </label>
            <label>
                <input type="radio" name="quality" value="medium"> Medium (600px)
            </label>
            <label>
                <input type="radio" name="quality" value="low"> Low (400px)
            </label>
        </div>
        
        <div id="previewArea" class="preview-container"></div>
        
        <div class="clearfix"></div>
        <button id="publishBtn" class="publish-btn">
            <i class="fas fa-paper-plane"></i> Publish
        </button>
        <div class="clearfix"></div>
    </div>

    <div id="feed"></div>
    <footer>
        <i class="fas fa-database"></i> Powered by Firebase Realtime Database (Asia Southeast 1)
    </footer>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
</script>

<script type="module">
    // ============================================
    // YOUR CORRECT FIREBASE CONFIGURATION
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyDexKxdFHxMAw7K1e9_xWRuwSrlqaqxviU",
        authDomain: "mhmsocial.firebaseapp.com",
        databaseURL: "https://mhmsocial-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "mhmsocial",
        storageBucket: "mhmsocial.firebasestorage.app",
        messagingSenderId: "1064455642855",
        appId: "1:1064455642855:web:aaced5e4269f52f1d34c42"
    };

    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set, onValue, remove, update, get } from "firebase/database";

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentImageBase64 = null;
    let currentImageSize = 0;
    let currentUser = "user_" + Math.random().toString(36).substr(2, 8);

    const statusBadge = document.getElementById('statusBadge');

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#ef4444' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Get selected compression quality
    function getSelectedQuality() {
        const selected = document.querySelector('input[name="quality"]:checked');
        if (!selected) return 'high';
        
        switch(selected.value) {
            case 'high': return { maxWidth: 800, quality: 0.8 };
            case 'medium': return { maxWidth: 600, quality: 0.6 };
            case 'low': return { maxWidth: 400, quality: 0.4 };
            default: return { maxWidth: 800, quality: 0.8 };
        }
    }

    // Compress image function
    function compressImage(file) {
        return new Promise((resolve) => {
            const settings = getSelectedQuality();
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > settings.maxWidth) {
                        height = (height * settings.maxWidth) / width;
                        width = settings.maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', settings.quality);
                    const sizeKB = Math.round((base64.length * 3/4) / 1024);
                    
                    resolve({ 
                        base64, 
                        sizeKB, 
                        width: Math.round(width), 
                        height: Math.round(height),
                        originalSize: Math.round(file.size / 1024)
                    });
                };
                img.src = e.target.result;
            };
        });
    }

    // Test database connection
    function testConnection() {
        const connectedRef = ref(db, '.info/connected');
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                statusBadge.innerHTML = '<i class="fas fa-check-circle"></i> Connected to Firebase';
                statusBadge.className = 'status connected';
                showToast('✅ Connected to Firebase Realtime Database!');
                loadPosts();
                // Create a demo post if no posts exist
                setTimeout(checkAndCreateDemoPost, 1000);
            } else {
                statusBadge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Connection Error';
                statusBadge.className = 'status error';
                showToast('❌ Connection failed. Check database rules.', true);
            }
        });
    }

    // Check if posts exist, if not create a demo
    async function checkAndCreateDemoPost() {
        const postsRef = ref(db, 'posts');
        const snapshot = await get(postsRef);
        if (!snapshot.exists()) {
            const demoRef = push(postsRef);
            await set(demoRef, {
                text: "🎉 Welcome to MHMSocial! This is a demo post. Try adding a photo or writing something!",
                authorName: "MHM Bot",
                timestamp: Date.now(),
                likes: 0,
                likedBy: {},
                comments: {}
            });
            showToast("✨ Demo post created!");
        }
    }

    // Image preview and upload
    const imageInput = document.getElementById('imageInput');
    const previewArea = document.getElementById('previewArea');

    imageInput.addEventListener('change', async (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            if (!file.type.startsWith('image/')) {
                showToast("Please select an image file", true);
                return;
            }
            
            showToast(`Compressing image...`);
            const compressed = await compressImage(file);
            currentImageBase64 = compressed.base64;
            currentImageSize = compressed.sizeKB;
            
            previewArea.innerHTML = `
                <div style="position: relative; display: inline-block;">
                    <img src="${compressed.base64}" class="preview-image" style="max-height: 150px; border-radius: 10px; border: 2px solid #667eea;">
                    <div style="font-size: 12px; margin-top: 5px; background: #f1f5f9; padding: 3px 8px; border-radius: 20px; display: inline-block;">
                        📸 ${compressed.width}×${compressed.height} · ${compressed.sizeKB}KB (saved ${Math.round((1 - compressed.sizeKB/compressed.originalSize)*100)}%)
                    </div>
                    <button onclick="clearImage()" style="position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-size: 14px;">×</button>
                </div>
            `;
            showToast(`✅ Image compressed to ${compressed.sizeKB}KB (${Math.round((1 - compressed.sizeKB/compressed.originalSize)*100)}% smaller!)`);
        }
    });

    window.clearImage = function() {
        currentImageBase64 = null;
        currentImageSize = 0;
        previewArea.innerHTML = '';
        imageInput.value = '';
    };

    // Publish post
    document.getElementById('publishBtn').addEventListener('click', async () => {
        const text = document.getElementById('postText').value.trim();
        if (!text && !currentImageBase64) {
            showToast("Please write something or add a photo", true);
            return;
        }

        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Publishing...';

        try {
            const postsRef = ref(db, 'posts');
            const newPostRef = push(postsRef);
            
            await set(newPostRef, {
                text: text || "📸 Shared a photo",
                imageBase64: currentImageBase64 || null,
                imageSize: currentImageSize || null,
                authorName: "User_" + currentUser.slice(0, 6),
                userId: currentUser,
                timestamp: Date.now(),
                likes: 0,
                likedBy: {},
                comments: {}
            });

            document.getElementById('postText').value = '';
            clearImage();
            showToast("✅ Post published successfully!");
            
            // Scroll to top to see new post
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
            console.error("Error:", error);
            showToast("Error: " + error.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publish';
        }
    });

    // Like post
    window.likePost = async (postId, currentLikes) => {
        const postRef = ref(db, `posts/${postId}`);
        const likedByRef = ref(db, `posts/${postId}/likedBy/${currentUser}`);
        
        try {
            const snapshot = await get(likedByRef);
            if (snapshot.exists()) {
                await update(postRef, { likes: currentLikes - 1 });
                await remove(likedByRef);
            } else {
                await update(postRef, { likes: currentLikes + 1 });
                await set(likedByRef, true);
            }
        } catch (error) {
            console.error("Like error:", error);
        }
    };

    // Add comment
    window.addComment = async (postId) => {
        const input = document.getElementById(`comment_${postId}`);
        const text = input.value.trim();
        if (!text) return;
        
        try {
            const commentsRef = ref(db, `posts/${postId}/comments`);
            const newCommentRef = push(commentsRef);
            await set(newCommentRef, {
                author: "User_" + currentUser.slice(0, 6),
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
            showToast("💬 Comment added!");
        } catch (error) {
            console.error("Comment error:", error);
        }
    };

    // Delete post
    window.deletePost = async (postId) => {
        if (!confirm("Delete this post permanently?")) return;
        try {
            await remove(ref(db, `posts/${postId}`));
            showToast("Post deleted");
        } catch (error) {
            showToast("Error deleting post", true);
        }
    };

    // Toggle comments
    window.toggleComments = (postId) => {
        const div = document.getElementById(`comments_${postId}`);
        if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Load posts
    function loadPosts() {
        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const posts = [];
            snapshot.forEach((childSnapshot) => {
                posts.push({ id: childSnapshot.key, ...childSnapshot.val() });
            });
            posts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            renderPosts(posts);
        }, (error) => {
            console.error("Load error:", error);
            document.getElementById('feed').innerHTML = `<div class="empty-feed"><i class="fas fa-exclamation-triangle"></i> Error: ${error.message}</div>`;
        });
    }

    function renderPosts(posts) {
        const feed = document.getElementById('feed');
        if (!posts.length) {
            feed.innerHTML = `
                <div class="empty-feed">
                    <i class="fas fa-comment" style="font-size: 48px; margin-bottom: 15px;"></i><br>
                    No posts yet.<br>
                    <small>Be the first to share something!</small>
                </div>
            `;
            return;
        }

        feed.innerHTML = posts.map(post => {
            const commentCount = post.comments ? Object.keys(post.comments).length : 0;
            const likedByCurrent = post.likedBy && post.likedBy[currentUser];
            
            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar"><i class="fas fa-user-circle"></i></div>
                        <div class="post-info">
                            <div class="username">${escapeHtml(post.authorName)}</div>
                            <div class="time">${new Date(post.timestamp).toLocaleString()}</div>
                        </div>
                        <button class="delete-btn" onclick="deletePost('${post.id}')" title="Delete post">🗑️</button>
                    </div>
                    <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                    ${post.imageBase64 ? `
                        <div class="post-image">
                            <img src="${post.imageBase64}" alt="Post image" loading="lazy">
                            ${post.imageSize ? `<div class="image-size">📸 Compressed: ${post.imageSize}KB</div>` : ''}
                        </div>
                    ` : ''}
                    <div class="actions">
                        <button class="action-btn ${likedByCurrent ? 'liked' : ''}" onclick="likePost('${post.id}', ${post.likes || 0})">
                            <i class="fa-${likedByCurrent ? 'solid' : 'regular'} fa-heart"></i> ${post.likes || 0} Likes
                        </button>
                        <button class="action-btn" onclick="toggleComments('${post.id}')">
                            <i class="far fa-comment"></i> ${commentCount} Comments
                        </button>
                    </div>
                    <div class="comments-section" id="comments_${post.id}">
                        <div id="commentList_${post.id}">
                            ${renderComments(post.comments)}
                        </div>
                        <div class="add-comment-form">
                            <input type="text" class="comment-input" id="comment_${post.id}" placeholder="Write a comment..." onkeypress="if(event.key==='Enter') addComment('${post.id}')">
                            <button onclick="addComment('${post.id}')" style="background: #667eea; color: white; border: none; border-radius: 20px; padding: 8px 20px; cursor: pointer;">Post</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderComments(comments) {
        if (!comments) return '<div style="padding: 8px;">No comments yet</div>';
        const commentsArray = Object.values(comments);
        if (!commentsArray.length) return '<div style="padding: 8px;">No comments yet</div>';
        return commentsArray.map(c => `
            <div class="comment">
                <span class="comment-author">${escapeHtml(c.author)}</span>
                <span>${escapeHtml(c.text)}</span>
            </div>
        `).join('');
    }

    // Start the app
    console.log("🚀 MHMSocial starting...");
    console.log("Database URL:", firebaseConfig.databaseURL);
    testConnection();
</script>
</body>
</html>
