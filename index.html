<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SocialFlow - Create, Share & Engage</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins & Inter mix -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(125deg, #f5f7fc 0%, #eef2f8 100%);
            color: #1e2a3a;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* header */
        .app-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .app-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .app-header p {
            color: #4b5563;
            margin-top: 0.3rem;
        }

        /* create post card */
        .create-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #ffffffaa;
            transition: all 0.2s;
        }

        .create-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .create-header h3 {
            font-weight: 600;
        }

        textarea {
            width: 100%;
            border-radius: 1.5rem;
            border: 1.5px solid #e2e8f0;
            padding: 1rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical;
            background: #fefefe;
            transition: 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* media preview */
        .media-preview {
            margin: 1rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .preview-item {
            position: relative;
            display: inline-block;
            border-radius: 1rem;
            overflow: hidden;
            background: #f1f5f9;
            max-width: 180px;
        }
        .preview-item img, .preview-item video {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 1rem;
            border: 1px solid #ddd;
        }
        .remove-media {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .media-buttons {
            display: flex;
            gap: 1rem;
            margin: 0.7rem 0;
            flex-wrap: wrap;
        }
        .media-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .media-btn:hover {
            background: #e2e8f0;
        }
        .publish-btn {
            background: linear-gradient(95deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 2.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(37,99,235,0.3);
            margin-top: 0.5rem;
        }
        .publish-btn:hover {
            transform: scale(0.97);
            background: linear-gradient(95deg, #1d4ed8, #2563eb);
        }

        /* feed posts */
        .feed-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }
        .feed-title h2 {
            font-weight: 700;
            font-size: 1.6rem;
        }
        .stats-badge {
            background: #eef3ff;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .post-card {
            background: white;
            border-radius: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.3rem 1.5rem;
            transition: 0.2s;
            border: 1px solid #eef2f6;
        }

        .post-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            background: #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .post-user {
            font-weight: 700;
        }
        .post-time {
            font-size: 0.7rem;
            color: #6c757d;
        }
        .post-text {
            font-size: 0.98rem;
            line-height: 1.4;
            margin: 0.8rem 0;
            color: #1e293b;
        }
        .post-media {
            margin: 0.8rem 0;
            border-radius: 1.2rem;
            overflow: hidden;
            max-width: 100%;
        }
        .post-media img, .post-media video {
            max-width: 100%;
            max-height: 380px;
            border-radius: 1rem;
            object-fit: cover;
            width: auto;
            border: 1px solid #eef2f0;
        }
        .actions {
            display: flex;
            gap: 1.8rem;
            margin: 0.7rem 0 0.5rem;
            border-top: 1px solid #edf2f7;
            padding-top: 0.8rem;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #4a5568;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-btn.liked {
            color: #ef4444;
        }
        .action-btn i {
            font-size: 1.1rem;
        }

        .comments-section {
            margin-top: 0.8rem;
            background: #fafcff;
            border-radius: 1.2rem;
            padding: 0.6rem 0.2rem 0.2rem;
        }
        .comment-list {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .single-comment {
            padding: 0.3rem 0;
            border-bottom: 1px solid #ecf3f9;
            display: flex;
            gap: 8px;
        }
        .comment-user {
            font-weight: 700;
            min-width: 70px;
        }
        .comment-text {
            color: #2d3a4b;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .comment-input {
            flex: 1;
            border-radius: 2rem;
            border: 1px solid #cbd5e1;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        .comment-submit {
            background: #eef2ff;
            border: none;
            border-radius: 2rem;
            padding: 0.2rem 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .create-card {
                padding: 1rem;
            }
        }
        .empty-feed {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 2rem;
            color: #94a3b8;
        }
        .delete-post {
            margin-left: auto;
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <h1><i class="fas fa-feather-alt"></i> SocialFlow</h1>
        <p>Write posts, upload media, comment & like — all in one creative space</p>
    </div>

    <!-- CREATE POST SECTION -->
    <div class="create-card">
        <div class="create-header">
            <div class="avatar"><i class="fas fa-user-astronaut"></i></div>
            <div><h3>Create new post</h3><span style="font-size:0.75rem;">Share what's on your mind</span></div>
        </div>
        <textarea id="postTextarea" rows="2" placeholder="Write something inspiring..."></textarea>
        
        <!-- Media upload -->
        <div class="media-buttons">
            <label class="media-btn" for="imageUpload"><i class="fas fa-image"></i> Upload Photo</label>
            <input type="file" id="imageUpload" accept="image/*" style="display:none">
            <label class="media-btn" for="videoUpload"><i class="fas fa-video"></i> Upload Video</label>
            <input type="file" id="videoUpload" accept="video/mp4,video/webm,video/quicktime" style="display:none">
        </div>
        <div id="mediaPreviewArea" class="media-preview"></div>
        
        <div style="display: flex; justify-content: flex-end;">
            <button id="publishPostBtn" class="publish-btn"><i class="fas fa-paper-plane"></i> Publish post</button>
        </div>
    </div>

    <!-- FEED SECTION -->
    <div class="feed-title">
        <h2><i class="fas fa-newspaper"></i> Community Feed</h2>
        <div class="stats-badge" id="postCountBadge">0 posts</div>
    </div>
    <div id="postsFeed" class="posts-container">
        <!-- dynamic posts injected here -->
        <div class="empty-feed"><i class="fas fa-comment-dots"></i> No posts yet. Create the first one! ✨</div>
    </div>
</div>

<script>
    // ----- DATA MODEL -----
    let posts = [];   // each post: { id, text, mediaType, mediaDataURL, likes, comments, timestamp, userName }

    // Helper: generate random username for demo
    const usernames = ["Alex Rivera", "Jamie Chen", "Taylor Swiftie", "Morgan Reed", "Casey Kim", "Jordan Lee", "Sam Parker"];
    function randomUsername() {
        return usernames[Math.floor(Math.random() * usernames.length)];
    }

    // Storage keys
    const STORAGE_KEY = "socialflow_posts";

    // load from localStorage
    function loadPostsFromStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                posts = JSON.parse(stored);
                // ensure each post has comments array & likes count structure (migration)
                posts = posts.map(p => ({
                    ...p,
                    comments: p.comments || [],
                    likes: typeof p.likes === 'number' ? p.likes : 0,
                    likedBy: p.likedBy || []
                }));
            } catch(e) { posts = []; }
        } else {
            // demo seed post with media sample (just text)
            posts = [];
            // optional seed to showcase
            const demoPost = {
                id: Date.now() + 1,
                text: "Welcome to SocialFlow! 🎉 You can upload photos, videos, leave comments and like posts. Everything saves automatically.",
                mediaType: null,
                mediaDataURL: null,
                likes: 5,
                likedBy: [],
                comments: [{ username: "Moderator", text: "Awesome platform!" }],
                timestamp: new Date().toLocaleString(),
                userName: "SocialFlow Team"
            };
            posts.push(demoPost);
        }
        renderFeed();
        updateStats();
        saveToLocalStorage();
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    function updateStats() {
        document.getElementById("postCountBadge").innerHTML = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;
    }

    // Render all posts
    function renderFeed() {
        const feedContainer = document.getElementById("postsFeed");
        if (!posts.length) {
            feedContainer.innerHTML = `<div class="empty-feed"><i class="fas fa-comment-dots"></i> No posts yet. Create the first one! ✨</div>`;
            return;
        }

        feedContainer.innerHTML = posts.map(post => `
            <div class="post-card" data-post-id="${post.id}">
                <div class="post-header">
                    <div class="post-avatar"><i class="fas fa-user-circle"></i></div>
                    <div>
                        <div class="post-user">${escapeHtml(post.userName || "Anonymous")}</div>
                        <div class="post-time">${escapeHtml(post.timestamp)}</div>
                    </div>
                    <button class="delete-post" data-id="${post.id}" title="Delete post"><i class="fas fa-trash-alt"></i></button>
                </div>
                <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                ${post.mediaDataURL ? `
                    <div class="post-media">
                        ${post.mediaType === 'image' ? `<img src="${post.mediaDataURL}" alt="post media">` : 
                          post.mediaType === 'video' ? `<video controls src="${post.mediaDataURL}"></video>` : ''}
                    </div>
                ` : ''}
                <div class="actions">
                    <button class="action-btn like-btn" data-id="${post.id}">
                        <i class="fa-${post.likedBy && post.likedBy.includes(getCurrentUserId()) ? 'solid' : 'regular'} fa-heart"></i> 
                        <span class="like-count">${post.likes || 0}</span> Likes
                    </button>
                    <button class="action-btn comment-toggle" data-id="${post.id}">
                        <i class="far fa-comment-dots"></i> Comments (${post.comments?.length || 0})
                    </button>
                </div>
                <div class="comments-section" id="comments-${post.id}" style="display: none;">
                    <div class="comment-list" id="commentList-${post.id}">
                        ${renderComments(post.comments || [])}
                    </div>
                    <div class="add-comment">
                        <input type="text" class="comment-input" id="commentInput-${post.id}" placeholder="Write a comment...">
                        <button class="comment-submit" data-id="${post.id}">Post</button>
                    </div>
                </div>
            </div>
        `).join('');

        // attach like listeners
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const postId = parseInt(btn.getAttribute('data-id'));
                handleLike(postId);
            });
        });
        // attach comment toggle
        document.querySelectorAll('.comment-toggle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = parseInt(btn.getAttribute('data-id'));
                const commentDiv = document.getElementById(`comments-${postId}`);
                if (commentDiv.style.display === 'none') commentDiv.style.display = 'block';
                else commentDiv.style.display = 'none';
            });
        });
        // attach comment submit
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = parseInt(btn.getAttribute('data-id'));
                const inputField = document.getElementById(`commentInput-${postId}`);
                const commentText = inputField.value.trim();
                if (commentText) {
                    addCommentToPost(postId, commentText);
                    inputField.value = '';
                } else alert("Write a comment first.");
            });
        });
        // delete post listeners
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                if (confirm("Delete this post permanently?")) {
                    posts = posts.filter(p => p.id !== id);
                    saveToLocalStorage();
                    renderFeed();
                    updateStats();
                }
            });
        });
    }

    function renderComments(commentsArray) {
        if (!commentsArray.length) return '<div style="padding:5px; color:#8ba0bc;">No comments yet. Be the first!</div>';
        return commentsArray.map(c => `
            <div class="single-comment">
                <span class="comment-user">${escapeHtml(c.username)}</span>
                <span class="comment-text">${escapeHtml(c.text)}</span>
            </div>
        `).join('');
    }

    function getCurrentUserId() {
        let userId = localStorage.getItem("socialflow_userId");
        if (!userId) {
            userId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("socialflow_userId", userId);
        }
        return userId;
    }

    function handleLike(postId) {
        const postIndex = posts.findIndex(p => p.id === postId);
        if (postIndex === -1) return;
        const post = posts[postIndex];
        const userId = getCurrentUserId();
        if (!post.likedBy) post.likedBy = [];
        const hasLiked = post.likedBy.includes(userId);
        if (hasLiked) {
            post.likes = Math.max(0, (post.likes || 0) - 1);
            post.likedBy = post.likedBy.filter(id => id !== userId);
        } else {
            post.likes = (post.likes || 0) + 1;
            post.likedBy.push(userId);
        }
        saveToLocalStorage();
        renderFeed();  // re-render to update button states
    }

    function addCommentToPost(postId, commentText) {
        const post = posts.find(p => p.id === postId);
        if (!post) return;
        if (!post.comments) post.comments = [];
        const newComment = {
            username: randomUsername(),
            text: commentText.substring(0, 180),
            timestamp: new Date().toISOString()
        };
        post.comments.push(newComment);
        saveToLocalStorage();
        // refresh only comments part without full rerender? but full rerender is safe
        renderFeed();
        // auto expand comments section after comment
        const commentDiv = document.getElementById(`comments-${postId}`);
        if (commentDiv) commentDiv.style.display = 'block';
    }

    // Helper for escaping
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) { return c; });
    }

    // ----- MEDIA UPLOAD & PREVIEW HANDLING -----
    let currentMediaFile = null;
    let currentMediaType = null;  // 'image' or 'video'
    let currentMediaDataURL = null;

    const imageInput = document.getElementById("imageUpload");
    const videoInput = document.getElementById("videoUpload");
    const previewArea = document.getElementById("mediaPreviewArea");

    function clearPreview() {
        previewArea.innerHTML = '';
        currentMediaFile = null;
        currentMediaType = null;
        currentMediaDataURL = null;
    }

    function displayPreview(file, type) {
        clearPreview();
        const reader = new FileReader();
        reader.onload = function(e) {
            currentMediaDataURL = e.target.result;
            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-item';
            if (type === 'image') {
                const img = document.createElement('img');
                img.src = e.target.result;
                previewDiv.appendChild(img);
            } else if (type === 'video') {
                const video = document.createElement('video');
                video.src = e.target.result;
                video.controls = true;
                video.style.maxHeight = '140px';
                previewDiv.appendChild(video);
            }
            const removeBtn = document.createElement('div');
            removeBtn.className = 'remove-media';
            removeBtn.innerHTML = '<i class="fas fa-times-circle"></i>';
            removeBtn.onclick = () => clearPreview();
            previewDiv.appendChild(removeBtn);
            previewArea.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
        currentMediaFile = file;
        currentMediaType = type;
    }

    imageInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            if (file.type.startsWith('image/')) {
                displayPreview(file, 'image');
            } else alert("Please select a valid image file.");
        }
        imageInput.value = '';
    });

    videoInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            if (file.type.startsWith('video/')) {
                displayPreview(file, 'video');
            } else alert("Please select a valid video file (mp4, webm).");
        }
        videoInput.value = '';
    });

    // publish post logic
    document.getElementById("publishPostBtn").addEventListener("click", () => {
        const postText = document.getElementById("postTextarea").value.trim();
        if (!postText && !currentMediaDataURL) {
            alert("Please write something or attach a photo/video.");
            return;
        }
        const newPost = {
            id: Date.now(),
            text: postText || "📸 Shared media",
            mediaType: currentMediaType,
            mediaDataURL: currentMediaDataURL,
            likes: 0,
            likedBy: [],
            comments: [],
            timestamp: new Date().toLocaleString(),
            userName: randomUsername(),
        };
        posts.unshift(newPost);  // newest first
        saveToLocalStorage();
        // reset form
        document.getElementById("postTextarea").value = '';
        clearPreview();
        renderFeed();
        updateStats();
        // optional small scroll
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // initial load and event listeners for storage options: persistence already active
    loadPostsFromStorage();
    // Additional feature: double check that posts array always has correct fields
    window.addEventListener('load', () => {
        // fallback for any old posts without comments array
        let changed = false;
        posts.forEach(p => {
            if (!p.comments) { p.comments = []; changed = true; }
            if (p.likes === undefined) { p.likes = 0; changed = true; }
            if (!p.likedBy) { p.likedBy = []; changed = true; }
        });
        if (changed) saveToLocalStorage();
        renderFeed();
    });
</script>
</body>
</html>
