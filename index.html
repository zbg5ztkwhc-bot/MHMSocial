<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MHMSocial + MHMChat | Unified Firestore Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-container h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            font-family: inherit;
        }
        .auth-input:focus { outline: none; border-color: #667eea; }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        .auth-link {
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-error { color: #ef4444; font-size: 13px; margin-top: 10px; }
        .main-app {
            display: none;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 10px;
        }
        .logout-header-btn {
            background: rgba(239,68,68,0.8);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
        }
        .social-feed {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 20px;
        }
        .create-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .create-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .avatar-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        textarea {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .media-actions {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }
        .media-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .publish-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            float: right;
        }
        .clearfix::after { content: ""; clear: both; display: table; }
        .post-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .post-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .post-user-info { flex: 1; }
        .post-username { font-weight: 700; }
        .post-time { font-size: 11px; color: #64748b; }
        .post-text { margin: 10px 0; line-height: 1.5; }
        .post-image img { max-width: 100%; max-height: 350px; border-radius: 16px; }
        .post-actions {
            display: flex;
            gap: 25px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #64748b;
        }
        .action-btn.liked { color: #ef4444; }
        .comments-section {
            margin-top: 12px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            display: none;
        }
        .comment-item {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .comment-author { font-weight: 700; color: #667eea; }
        .add-comment-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .comment-input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 6px 12px;
        }
        .user-info-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .user-avatar-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 32px;
        }
        .chat-popup-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            color: white;
            font-size: 24px;
        }
        .chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .chat-modal.active { display: flex; }
        .chat-modal-content {
            width: 90%;
            max-width: 500px;
            height: 85vh;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-modal-header {
            background: #1e293b;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-iframe-container { flex: 1; }
        iframe { width: 100%; height: 100%; border: none; }
        .empty-feed { text-align: center; padding: 40px; color: #94a3b8; }
        @media (max-width: 900px) { .two-columns { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-container">
    <h2><i class="fas fa-fire"></i> MHMSocial</h2>
    <div class="subtitle" style="color:#64748b; margin-bottom:20px;">Sign in with your MHMChat account</div>
    
    <div id="loginForm">
        <input type="email" id="loginEmail" class="auth-input" placeholder="Email address">
        <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
        <button id="loginBtn" class="auth-btn">Log In</button>
        <div class="auth-link" id="showSignupLink">Don't have an account? Sign Up</div>
        <div id="authError" class="auth-error"></div>
    </div>

    <div id="signupForm" style="display: none;">
        <input type="text" id="signupName" class="auth-input" placeholder="Full Name">
        <input type="email" id="signupEmail" class="auth-input" placeholder="Email address">
        <input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)">
        <button id="signupBtn" class="auth-btn">Create Account</button>
        <div class="auth-link" id="showLoginLink">Already have an account? Log In</div>
        <div id="signupError" class="auth-error"></div>
        <div id="signupSuccess" class="auth-success" style="color:#10b981;"></div>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="main-app">
    <div class="header">
        <h1><i class="fas fa-fire"></i> MHMSocial</h1>
        <p>Share posts with photos • Real-time feed</p>
        <div class="user-badge">
            <i class="fas fa-user-circle"></i>
            <span id="navUserName">User</span>
            <button id="navLogoutBtn" class="logout-header-btn">Logout</button>
        </div>
    </div>

    <div class="two-columns">
        <div class="social-feed" id="socialFeedContainer">
            <div class="empty-feed"><i class="fas fa-spinner fa-pulse"></i> Loading feed...</div>
        </div>
        <div>
            <div class="user-info-card">
                <div class="user-avatar-large"><i class="fas fa-user"></i></div>
                <h3 id="userNameDisplay">Loading...</h3>
                <p id="userEmailDisplay" style="color:#64748b; font-size:13px;"></p>
                <small style="color:#10b981;"><i class="fas fa-check-circle"></i> Authenticated via Firestore</small>
            </div>
        </div>
    </div>
</div>

<div id="chatPopupBtn" class="chat-popup-btn">
    <i class="fas fa-comment-dots"></i>
</div>

<div id="chatModal" class="chat-modal">
    <div class="chat-modal-content">
        <div class="chat-modal-header">
            <h3><i class="fas fa-comments"></i> MHMChat</h3>
            <button id="closeChatBtn" class="close-chat">&times;</button>
        </div>
        <div class="chat-iframe-container">
            <iframe id="chatIframe" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    // Firebase Configuration - Same as MHMChat
    const firebaseConfig = {
        apiKey: "AIzaSyDexKxdFHxMAw7K1e9_xWRuwSrlqaqxviU",
        authDomain: "mhmsocial.firebaseapp.com",
        databaseURL: "https://mhmsocial-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "mhmsocial",
        storageBucket: "mhmsocial.firebasestorage.app",
        messagingSenderId: "1064455642855",
        appId: "1:1064455642855:web:aaced5e4269f52f1d34c42"
    };

    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set, onValue, update, remove, get } from "firebase/database";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc, query, collection, where, getDocs } from "firebase/firestore";

    const app = initializeApp(firebaseConfig);
    const rtdb = getDatabase(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserData = null;
    let currentImageBase64 = null;
    let postsList = [];

    // DOM Elements
    const authScreen = document.getElementById('authScreen');
    const mainApp = document.getElementById('mainApp');
    const chatPopupBtn = document.getElementById('chatPopupBtn');
    const chatModal = document.getElementById('chatModal');
    const closeChatBtn = document.getElementById('closeChatBtn');
    const chatIframe = document.getElementById('chatIframe');
    const navUserName = document.getElementById('navUserName');
    const navLogoutBtn = document.getElementById('navLogoutBtn');
    const userNameDisplay = document.getElementById('userNameDisplay');
    const userEmailDisplay = document.getElementById('userEmailDisplay');
    const socialContainer = document.getElementById('socialFeedContainer');

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:80px;right:20px;background:${isError ? '#ef4444' : '#10b981'};color:white;padding:12px 20px;border-radius:12px;z-index:3000;font-size:14px;animation:fadeInOut 3s ease;`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    const style = document.createElement('style');
    style.textContent = `@keyframes fadeInOut { 0% { opacity: 0; transform: translateX(50px); } 15% { opacity: 1; transform: translateX(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(50px); } }`;
    document.head.appendChild(style);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    async function compressImage(file, maxWidth = 700, quality = 0.7) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width, height = img.height;
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve({ base64: canvas.toDataURL('image/jpeg', quality) });
                };
                img.src = e.target.result;
            };
        });
    }

    // Create user in Firestore (matching MHMChat structure)
    async function createUserInFirestore(userId, email, name) {
        const userRef = doc(db, 'users', userId);
        await setDoc(userRef, {
            email: email,
            emailLower: email.toLowerCase(),
            name: name || email.split('@')[0],
            nameLower: (name || email.split('@')[0]).toLowerCase(),
            contacts: [],
            groups: [],
            createdAt: new Date().toISOString()
        });
    }

    // Get user data from Firestore
    async function getUserData(userId) {
        const userRef = doc(db, 'users', userId);
        const docSnap = await getDoc(userRef);
        if (docSnap.exists()) {
            return docSnap.data();
        }
        return null;
    }

    function renderFeed() {
        if (!postsList.length) {
            socialContainer.innerHTML = `
                <div class="create-card">
                    <div class="create-header"><div class="avatar-icon"><i class="fas fa-user-astronaut"></i></div><div><h3>Create a post</h3></div></div>
                    <textarea id="postText" rows="2" placeholder="What's on your mind? 🌍"></textarea>
                    <div class="media-actions"><label class="media-btn" for="imageUpload"><i class="fas fa-camera"></i> Add Photo</label><input type="file" id="imageUpload" accept="image/*" style="display:none"></div>
                    <div id="previewArea" class="preview-area"></div>
                    <div class="clearfix"></div><button id="publishBtn" class="publish-btn"><i class="fas fa-paper-plane"></i> Publish</button>
                    <div class="clearfix"></div>
                </div>
                <div class="empty-feed"><i class="fas fa-comment"></i> No posts yet. Be the first!</div>
            `;
            attachCreatePostEvents();
            return;
        }
        let feedHtml = `<div class="create-card"><div class="create-header"><div class="avatar-icon"><i class="fas fa-user-astronaut"></i></div><div><h3>Create a post</h3></div></div>
            <textarea id="postText" rows="2" placeholder="What's on your mind? 🌍"></textarea>
            <div class="media-actions"><label class="media-btn" for="imageUpload"><i class="fas fa-camera"></i> Add Photo</label><input type="file" id="imageUpload" accept="image/*" style="display:none"></div>
            <div id="previewArea" class="preview-area"></div>
            <div class="clearfix"></div><button id="publishBtn" class="publish-btn"><i class="fas fa-paper-plane"></i> Publish</button>
            <div class="clearfix"></div></div>`;
        postsList.forEach(post => {
            feedHtml += `<div class="post-card"><div class="post-header"><div class="post-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="post-user-info"><div class="post-username">${escapeHtml(post.authorName)}</div><div class="post-time">${new Date(post.timestamp).toLocaleString()}</div></div></div>
                <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                ${post.imageBase64 ? `<div class="post-image"><img src="${post.imageBase64}" loading="lazy"></div>` : ''}
                <div class="post-actions"><button class="action-btn like-btn" data-id="${post.id}" data-likes="${post.likes || 0}"><i class="fa-regular fa-heart"></i> <span>${post.likes || 0}</span> Likes</button>
                <button class="action-btn comment-toggle" data-id="${post.id}"><i class="fa-regular fa-comment"></i> Comments (${post.comments ? Object.keys(post.comments).length : 0})</button></div>
                <div class="comments-section" id="comments-${post.id}"><div id="commentList-${post.id}">${renderComments(post.comments)}</div>
                <div class="add-comment-form"><input type="text" class="comment-input" id="commentInput-${post.id}" placeholder="Write a comment..."><button class="comment-submit" data-id="${post.id}">Post</button></div></div></div>`;
        });
        socialContainer.innerHTML = feedHtml;
        attachCreatePostEvents();
        attachPostEvents();
    }

    function renderComments(comments) {
        if (!comments) return '<div>No comments yet</div>';
        const arr = Object.values(comments);
        if (!arr.length) return '<div>No comments yet</div>';
        return arr.map(c => `<div class="comment-item"><span class="comment-author">${escapeHtml(c.author)}</span><span>${escapeHtml(c.text)}</span></div>`).join('');
    }

    function attachCreatePostEvents() {
        const publishBtn = document.getElementById('publishBtn');
        if (!publishBtn) return;
        const imageInput = document.getElementById('imageUpload');
        const previewArea = document.getElementById('previewArea');
        if (imageInput) {
            imageInput.onchange = async (e) => {
                if (e.target.files && e.target.files[0]) {
                    const compressed = await compressImage(e.target.files[0]);
                    currentImageBase64 = compressed.base64;
                    previewArea.innerHTML = `<div class="preview-item"><img src="${compressed.base64}" style="max-height:100px;"><div class="remove-preview" onclick="this.parentElement.remove(); window.currentImageBase64=null;">×</div></div>`;
                }
            };
        }
        publishBtn.onclick = async () => {
            const text = document.getElementById('postText')?.value.trim();
            if (!text && !currentImageBase64) { showToast("Write something or add a photo", true); return; }
            if (!currentUser) return;
            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Publishing...';
            try {
                const postsRef = ref(rtdb, 'posts');
                const newPostRef = push(postsRef);
                await set(newPostRef, {
                    text: text || "📸 Shared a photo",
                    imageBase64: currentImageBase64 || null,
                    authorName: currentUserData?.name || currentUser.email.split('@')[0],
                    userId: currentUser.uid,
                    timestamp: Date.now(),
                    likes: 0,
                    likedBy: {},
                    comments: {}
                });
                document.getElementById('postText').value = '';
                if (previewArea) previewArea.innerHTML = '';
                currentImageBase64 = null;
                showToast("✅ Post published!");
            } catch (error) { showToast("Error: " + error.message, true); }
            finally { publishBtn.disabled = false; publishBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Publish'; }
        };
    }

    function attachPostEvents() {
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = async () => {
                if (!currentUser) return;
                const postId = btn.dataset.id;
                const currentLikes = parseInt(btn.dataset.likes);
                const likedByRef = ref(rtdb, `posts/${postId}/likedBy/${currentUser.uid}`);
                const snap = await get(likedByRef);
                if (snap.exists()) {
                    await update(ref(rtdb, `posts/${postId}`), { likes: currentLikes - 1 });
                    await remove(likedByRef);
                } else {
                    await update(ref(rtdb, `posts/${postId}`), { likes: currentLikes + 1 });
                    await set(likedByRef, true);
                }
            };
        });
        document.querySelectorAll('.comment-toggle').forEach(btn => {
            btn.onclick = () => {
                const div = document.getElementById(`comments-${btn.dataset.id}`);
                if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
            };
        });
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.onclick = async () => {
                if (!currentUser) return;
                const postId = btn.dataset.id;
                const input = document.getElementById(`commentInput-${postId}`);
                const text = input.value.trim();
                if (!text) return;
                const commentRef = ref(rtdb, `posts/${postId}/comments/${Date.now()}`);
                await set(commentRef, { 
                    author: currentUserData?.name || currentUser.email.split('@')[0], 
                    text: text, 
                    timestamp: Date.now() 
                });
                input.value = '';
                showToast("Comment added!");
            };
        });
    }

    function loadPostsRealtime() {
        const postsRef = ref(rtdb, 'posts');
        onValue(postsRef, (snapshot) => {
            const posts = [];
            snapshot.forEach(child => posts.push({ id: child.key, ...child.val() }));
            posts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            postsList = posts;
            renderFeed();
        });
    }

    // AUTH UI - Using MHMChat Firestore
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    document.getElementById('showSignupLink').onclick = () => { loginForm.style.display = 'none'; signupForm.style.display = 'block'; };
    document.getElementById('showLoginLink').onclick = () => { signupForm.style.display = 'none'; loginForm.style.display = 'block'; };

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { document.getElementById('authError').textContent = 'Fill all fields'; return; }
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (err) {
            document.getElementById('authError').textContent = err.message;
        }
    };

    document.getElementById('signupBtn').onclick = async () => {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!email || !password) { document.getElementById('signupError').textContent = 'Fill all fields'; return; }
        if (password.length < 6) { document.getElementById('signupError').textContent = 'Password min 6 characters'; return; }
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await createUserInFirestore(userCredential.user.uid, email, name);
            document.getElementById('signupSuccess').textContent = 'Account created successfully!';
            setTimeout(() => {
                signupForm.style.display = 'none';
                loginForm.style.display = 'block';
            }, 1500);
        } catch (err) {
            document.getElementById('signupError').textContent = err.message;
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            currentUserData = await getUserData(user.uid);
            if (!currentUserData) {
                await createUserInFirestore(user.uid, user.email, user.email.split('@')[0]);
                currentUserData = await getUserData(user.uid);
            }
            authScreen.style.display = 'none';
            mainApp.style.display = 'block';
            chatPopupBtn.style.display = 'flex';
            const displayName = currentUserData?.name || user.email.split('@')[0];
            navUserName.textContent = displayName;
            userNameDisplay.textContent = displayName;
            userEmailDisplay.textContent = user.email;
            loadPostsRealtime();
        } else {
            currentUser = null;
            currentUserData = null;
            authScreen.style.display = 'block';
            mainApp.style.display = 'none';
            chatPopupBtn.style.display = 'none';
            chatModal.classList.remove('active');
        }
    });

    navLogoutBtn.onclick = async () => { await signOut(auth); showToast("Logged out"); };

    // Chat Popup
    const chatHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>MHMChat</title><style>body{font-family:system-ui;background:#f1f5f9;margin:0;padding:20px;text-align:center;}.chat-placeholder{background:white;border-radius:20px;padding:40px;color:#64748b;}</style></head><body><div class="chat-placeholder"><i class="fas fa-comments" style="font-size:48px;margin-bottom:20px;"></i><h3>MHMChat</h3><p>Chat feature integrated!<br>Your account works across both platforms.</p></div></body></html>`;
    const blob = new Blob([chatHTML], { type: 'text/html' });
    chatIframe.src = URL.createObjectURL(blob);
    chatPopupBtn.onclick = () => chatModal.classList.add('active');
    closeChatBtn.onclick = () => chatModal.classList.remove('active');
    chatModal.onclick = (e) => { if (e.target === chatModal) chatModal.classList.remove('active'); };
</script>
</body>
</html>
