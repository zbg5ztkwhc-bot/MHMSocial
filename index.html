<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHMSocial - Working Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .create-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .media-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 15px 0;
            display: inline-block;
        }
        .publish-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            float: right;
        }
        .post-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .post-user {
            font-weight: bold;
            font-size: 16px;
        }
        .post-time {
            font-size: 12px;
            color: #64748b;
        }
        .post-text {
            margin: 12px 0;
            line-height: 1.5;
        }
        .post-image {
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
        }
        .post-image img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        .action-bar {
            display: flex;
            gap: 25px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #64748b;
        }
        .action-btn.liked {
            color: #ef4444;
        }
        .comments-area {
            margin-top: 15px;
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
        }
        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        .comment-author {
            font-weight: bold;
            min-width: 80px;
        }
        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .comment-input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 8px 15px;
        }
        .empty-feed {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            color: #64748b;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        .status-badge {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-fire"></i> MHMSocial</h1>
        <p>Working with Firebase Realtime Database</p>
        <div class="status-badge" id="connectionStatus">
            <i class="fas fa-spinner fa-pulse"></i> Connecting...
        </div>
    </div>

    <div class="create-card">
        <textarea id="postText" rows="3" placeholder="What's on your mind? 🌍"></textarea>
        
        <label class="media-btn" for="imageInput">
            <i class="fas fa-camera"></i> Add Photo
        </label>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        
        <div id="imagePreview" style="margin: 10px 0;"></div>
        
        <div class="clearfix"></div>
        <button id="publishBtn" class="publish-btn">
            <i class="fas fa-paper-plane"></i> Publish
        </button>
        <div class="clearfix"></div>
    </div>

    <div id="feedContainer">
        <div class="empty-feed">
            <i class="fas fa-spinner fa-pulse"></i> Loading posts...
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
    }
</script>

<script type="module">
    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDexKxdFHxMAw7K1e9_xWRuwSrlqaqxviU",
        authDomain: "mhmsocial.firebaseapp.com",
        projectId: "mhmsocial",
        storageBucket: "mhmsocial.firebasestorage.app",
        messagingSenderId: "1064455642855",
        appId: "1:1064455642855:web:aaced5e4269f52f1d34c42",
        measurementId: "G-PXLBT8SQTX",
        databaseURL: "https://mhmsocial-default-rtdb.firebaseio.com"
    };

    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, push, set, onValue, remove, update } from "firebase/database";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let currentImageBase64 = null;

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#ef4444' : '#22c55e';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Compress image function
    function compressImage(file, maxWidth = 800, quality = 0.7) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64 = canvas.toDataURL('image/jpeg', quality);
                    const sizeKB = Math.round((base64.length * 3/4) / 1024);
                    
                    resolve({ base64, sizeKB, width, height });
                };
                img.src = e.target.result;
            };
        });
    }

    // Image upload preview
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');

    imageInput.addEventListener('change', async (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            showToast(`Compressing image...`);
            const compressed = await compressImage(file, 800, 0.7);
            currentImageBase64 = compressed.base64;
            
            imagePreview.innerHTML = `
                <div style="position: relative; display: inline-block;">
                    <img src="${compressed.base64}" style="max-height: 150px; border-radius: 10px;">
                    <div style="font-size: 12px; margin-top: 5px;">${compressed.width}×${compressed.height} · ${compressed.sizeKB}KB</div>
                    <button onclick="document.getElementById('imagePreview').innerHTML = ''; currentImageBase64 = null;" style="position: absolute; top: -8px; right: -8px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer;">×</button>
                </div>
            `;
            showToast(`✅ Image compressed to ${compressed.sizeKB}KB`);
        }
    });

    // Authentication
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-check-circle"></i> Connected to Firebase';
            document.getElementById('connectionStatus').style.background = '#22c55e';
            console.log("✅ Signed in:", user.uid);
            loadPosts();
        } else {
            signInAnonymously(auth).then(() => {
                console.log("Signed in anonymously");
            }).catch(error => {
                console.error("Auth error:", error);
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Connection Error';
                document.getElementById('connectionStatus').style.background = '#ef4444';
                showToast("Error connecting to Firebase", true);
            });
        }
    });

    // Load posts
    function loadPosts() {
        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            const posts = [];
            snapshot.forEach((childSnapshot) => {
                posts.push({ id: childSnapshot.key, ...childSnapshot.val() });
            });
            posts.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            renderPosts(posts);
            
            if (posts.length === 0) {
                // Create a test post automatically
                createTestPost();
            }
        }, (error) => {
            console.error("Error loading posts:", error);
            showToast("Error loading posts: " + error.message, true);
        });
    }

    // Create a test post
    async function createTestPost() {
        const postsRef = ref(db, 'posts');
        const newPostRef = push(postsRef);
        await set(newPostRef, {
            text: "🎉 Welcome to MHMSocial! This is your first post. Try adding a photo or writing something!",
            authorName: "MHM Bot",
            userId: "system",
            timestamp: Date.now(),
            likes: {},
            likesCount: 0,
            comments: {}
        });
        console.log("Test post created");
    }

    // Publish post
    document.getElementById('publishBtn').addEventListener('click', async () => {
        const text = document.getElementById('postText').value.trim();
        if (!text && !currentImageBase64) {
            showToast("Please write something or add a photo", true);
            return;
        }

        const btn = document.getElementById('publishBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Publishing...';

        try {
            const postsRef = ref(db, 'posts');
            const newPostRef = push(postsRef);
            await set(newPostRef, {
                text: text || "📸 Shared a photo",
                imageBase64: currentImageBase64 || null,
                authorName: "User_" + (currentUser?.uid.slice(0, 6) || "Anonymous"),
                userId: currentUser?.uid || "unknown",
                timestamp: Date.now(),
                likes: {},
                likesCount: 0,
                comments: {}
            });

            document.getElementById('postText').value = '';
            imagePreview.innerHTML = '';
            currentImageBase64 = null;
            showToast("✅ Post published!");
        } catch (error) {
            console.error("Error:", error);
            showToast("Error: " + error.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publish';
        }
    });

    // Like post
    window.toggleLike = async (postId, currentLikes, isLiked) => {
        if (!currentUser) return;
        const likeRef = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
        const countRef = ref(db, `posts/${postId}/likesCount`);
        
        if (isLiked) {
            await remove(likeRef);
            await set(countRef, currentLikes - 1);
        } else {
            await set(likeRef, true);
            await set(countRef, currentLikes + 1);
        }
    };

    // Add comment
    window.addComment = async (postId) => {
        const input = document.getElementById(`commentInput-${postId}`);
        const text = input.value.trim();
        if (!text || !currentUser) return;
        
        const commentId = Date.now().toString();
        const commentRef = ref(db, `posts/${postId}/comments/${commentId}`);
        await set(commentRef, {
            author: "User_" + (currentUser?.uid.slice(0, 6) || "Anonymous"),
            text: text,
            timestamp: Date.now()
        });
        input.value = '';
        showToast("Comment added!");
    };

    // Delete post
    window.deletePost = async (postId) => {
        if (!confirm("Delete this post?")) return;
        await remove(ref(db, `posts/${postId}`));
        showToast("Post deleted");
    };

    // Toggle comments
    window.toggleComments = (postId) => {
        const div = document.getElementById(`comments-${postId}`);
        if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderPosts(posts) {
        const container = document.getElementById('feedContainer');
        if (!posts.length) {
            container.innerHTML = '<div class="empty-feed"><i class="fas fa-comment"></i> No posts yet. Create the first post!</div>';
            return;
        }

        container.innerHTML = posts.map(post => {
            const isLiked = post.likes && currentUser && post.likes[currentUser.uid] === true;
            const likeCount = post.likesCount || 0;
            const commentCount = post.comments ? Object.keys(post.comments).length : 0;
            const isOwner = post.userId === currentUser?.uid;
            
            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar"><i class="fas fa-user"></i></div>
                        <div>
                            <div class="post-user">${escapeHtml(post.authorName)}</div>
                            <div class="post-time">${new Date(post.timestamp).toLocaleString()}</div>
                        </div>
                        ${isOwner ? `<button onclick="deletePost('${post.id}')" style="margin-left: auto; background: none; border: none; cursor: pointer; color: #cbd5e1;">🗑️</button>` : ''}
                    </div>
                    <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                    ${post.imageBase64 ? `
                        <div class="post-image">
                            <img src="${post.imageBase64}" alt="Post image">
                        </div>
                    ` : ''}
                    <div class="action-bar">
                        <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}', ${likeCount}, ${isLiked})">
                            <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${likeCount} Likes
                        </button>
                        <button class="action-btn" onclick="toggleComments('${post.id}')">
                            <i class="far fa-comment"></i> ${commentCount} Comments
                        </button>
                    </div>
                    <div class="comments-area" id="comments-${post.id}" style="display: none;">
                        <div id="commentList-${post.id}">
                            ${renderComments(post.comments)}
                        </div>
                        <div class="add-comment">
                            <input type="text" class="comment-input" id="commentInput-${post.id}" placeholder="Write a comment...">
                            <button onclick="addComment('${post.id}')" style="background: #667eea; color: white; border: none; border-radius: 20px; padding: 8px 20px; cursor: pointer;">Post</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderComments(comments) {
        if (!comments) return '<div>No comments yet</div>';
        const commentsArray = Object.values(comments);
        if (!commentsArray.length) return '<div>No comments yet</div>';
        return commentsArray.map(c => `
            <div class="comment-item">
                <span class="comment-author">${escapeHtml(c.author)}</span>
                <span>${escapeHtml(c.text)}</span>
            </div>
        `).join('');
    }

    console.log("🚀 MHMSocial is running!");
</script>
</body>
</html>
