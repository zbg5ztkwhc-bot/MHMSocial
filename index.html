<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SocialCanvas | Post, Share & Engage</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f6 100%);
            color: #0f172a;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3a5f, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #475569;
            margin-top: 0.3rem;
        }
        .storage-status {
            display: inline-block;
            background: #e6f0ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-top: 0.8rem;
            color: #1e4a76;
        }

        /* Create Post Card */
        .create-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(2px);
            border-radius: 1.8rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
            padding: 1.6rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #ffffffcc;
            transition: 0.2s;
        }
        .create-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .avatar-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #3b82f6, #1e40af);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .create-header h3 {
            font-weight: 600;
        }
        .post-input {
            width: 100%;
            border-radius: 1.5rem;
            border: 1.5px solid #e2e8f0;
            padding: 1rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            background: #ffffff;
        }
        .post-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .media-actions {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .media-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .media-btn:hover {
            background: #e2e8f0;
        }
        .preview-area {
            margin: 0.8rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .preview-item {
            position: relative;
            background: #f1f5f9;
            border-radius: 1rem;
            overflow: hidden;
            max-width: 180px;
        }
        .preview-item img, .preview-item video {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 0.8rem;
        }
        .remove-preview {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        .publish-btn {
            background: linear-gradient(95deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 2.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.2rem;
            float: right;
        }
        .publish-btn:hover {
            transform: scale(0.97);
            background: linear-gradient(95deg, #1d4ed8, #2563eb);
        }

        /* Feed section */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }
        .feed-header h2 {
            font-weight: 700;
            font-size: 1.5rem;
        }
        .post-counter {
            background: #eef3ff;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
        }
        .post-card {
            background: white;
            border-radius: 1.6rem;
            padding: 1.3rem 1.5rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            border: 1px solid #eef2f8;
            transition: 0.1s;
        }
        .post-header {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.7rem;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #f97316, #ea580c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .post-user-info {
            flex: 1;
        }
        .post-username {
            font-weight: 700;
        }
        .post-time {
            font-size: 0.7rem;
            color: #6c757d;
        }
        .delete-post {
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.1s;
        }
        .delete-post:hover {
            color: #ef4444;
        }
        .post-text {
            margin: 0.5rem 0 0.7rem;
            line-height: 1.5;
            word-break: break-word;
        }
        .post-media {
            margin: 0.7rem 0;
            border-radius: 1rem;
            overflow: hidden;
        }
        .post-media img, .post-media video {
            max-width: 100%;
            max-height: 380px;
            border-radius: 1rem;
            object-fit: contain;
            background: #f1f5f9;
        }
        .action-bar {
            display: flex;
            gap: 1.8rem;
            margin: 0.7rem 0 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid #edf2f7;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #475569;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-btn.liked {
            color: #ef4444;
        }
        .comments-area {
            margin-top: 0.8rem;
            background: #fafdff;
            border-radius: 1.2rem;
            padding: 0.6rem;
        }
        .comment-list {
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .comment-item {
            display: flex;
            gap: 8px;
            padding: 0.3rem 0;
            border-bottom: 1px solid #ecf3f9;
        }
        .comment-author {
            font-weight: 700;
            min-width: 70px;
            color: #1e40af;
        }
        .add-comment-form {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .comment-input {
            flex: 1;
            border-radius: 2rem;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 0.9rem;
            font-size: 0.8rem;
        }
        .comment-submit {
            background: #eef2ff;
            border: none;
            border-radius: 2rem;
            padding: 0.2rem 1.2rem;
            cursor: pointer;
            font-weight: 500;
        }
        .empty-feed {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 2rem;
            color: #94a3b8;
        }
        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #62748c;
        }
        @media (max-width: 650px) {
            body { padding: 1rem; }
            .create-card { padding: 1rem; }
        }
        .clear-storage {
            background: #fee2e2;
            border: none;
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            margin-left: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-hashtag"></i> SocialCanvas</h1>
        <p>Express yourself — posts, images, videos, comments & likes</p>
        <div class="storage-status">
            <i class="fas fa-database"></i> Persistent storage active · All data saved locally
            <button id="globalClearBtn" class="clear-storage"><i class="fas fa-trash-alt"></i> Reset all data</button>
        </div>
    </div>

    <!-- CREATE POST SECTION -->
    <div class="create-card">
        <div class="create-header">
            <div class="avatar-icon"><i class="fas fa-feather-alt"></i></div>
            <div><h3>Create new post</h3><span style="font-size:0.75rem;">Share text, photos or videos</span></div>
        </div>
        <textarea id="postContent" class="post-input" rows="2" placeholder="What's happening? Write your thoughts..."></textarea>
        
        <div class="media-actions">
            <label class="media-btn" for="photoUpload"><i class="fas fa-camera"></i> Add Photo</label>
            <input type="file" id="photoUpload" accept="image/*" style="display:none">
            <label class="media-btn" for="videoUploadFile"><i class="fas fa-video"></i> Add Video</label>
            <input type="file" id="videoUploadFile" accept="video/mp4,video/webm" style="display:none">
        </div>
        <div id="mediaPreview" class="preview-area"></div>
        <div style="clear:both"></div>
        <button id="publishPost" class="publish-btn"><i class="fas fa-paper-plane"></i> Publish post</button>
        <div style="clear:both"></div>
    </div>

    <!-- FEED SECTION -->
    <div class="feed-header">
        <h2><i class="fas fa-stream"></i> Community feed</h2>
        <div class="post-counter" id="postCountDisplay">0 posts</div>
    </div>
    <div id="postsFeed" class="posts-container">
        <div class="empty-feed"><i class="fas fa-spinner fa-pulse"></i> Loading posts...</div>
    </div>
    <footer>
        <i class="fas fa-shield-alt"></i> All posts, comments and likes are saved automatically in your browser (localStorage)
    </footer>
</div>

<script>
    // ---------- DATA MODEL ----------
    let posts = [];          // each post: { id, text, mediaType, mediaURL, likes, likedBy, comments, timestamp, authorName }

    // Helper: random usernames for demo (you can customize)
    const namePool = ["Alex Morgan", "Jamie Wren", "Taylor Chen", "Jordan Blake", "Riley Santos", "Casey Lin", "Samira Kahn", "Morgan James"];
    function getRandomName() {
        return namePool[Math.floor(Math.random() * namePool.length)];
    }

    // Unique user ID for like tracking (persistent)
    let currentUserId = localStorage.getItem("socialcanvas_user_id");
    if (!currentUserId) {
        currentUserId = "user_" + Math.random().toString(36).substr(2, 10);
        localStorage.setItem("socialcanvas_user_id", currentUserId);
    }

    // Storage key
    const STORAGE_POSTS_KEY = "socialcanvas_posts_data";

    // Save to localStorage
    function persistPosts() {
        localStorage.setItem(STORAGE_POSTS_KEY, JSON.stringify(posts));
    }

    // Load posts from localStorage
    function loadPostsFromStorage() {
        const stored = localStorage.getItem(STORAGE_POSTS_KEY);
        if (stored) {
            try {
                let parsed = JSON.parse(stored);
                // ensure each post has required fields (migration)
                posts = parsed.map(p => ({
                    id: p.id,
                    text: p.text || "",
                    mediaType: p.mediaType || null,
                    mediaURL: p.mediaURL || null,
                    likes: typeof p.likes === 'number' ? p.likes : 0,
                    likedBy: Array.isArray(p.likedBy) ? p.likedBy : [],
                    comments: Array.isArray(p.comments) ? p.comments : [],
                    timestamp: p.timestamp || new Date().toLocaleString(),
                    authorName: p.authorName || getRandomName()
                }));
            } catch(e) { posts = []; }
        }
        if (!posts.length) {
            // Seed demo post
            posts = [{
                id: Date.now(),
                text: "🎉 Welcome to SocialCanvas! Create posts, upload photos/videos, comment and like. Everything stays saved!",
                mediaType: null,
                mediaURL: null,
                likes: 4,
                likedBy: [],
                comments: [{ author: "Community", text: "This is awesome!" }],
                timestamp: new Date().toLocaleString(),
                authorName: "SocialCanvas Team"
            }];
            persistPosts();
        }
        updatePostCounter();
        renderFeed();
    }

    function updatePostCounter() {
        document.getElementById("postCountDisplay").innerText = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;
    }

    // escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) { return c; });
    }

    // render comments HTML
    function renderCommentsList(commentsArray) {
        if (!commentsArray.length) return '<div style="padding:5px; color:#8ba0bc;">💬 No comments yet. Be the first!</div>';
        return commentsArray.map(c => `
            <div class="comment-item">
                <span class="comment-author">${escapeHtml(c.author)}</span>
                <span>${escapeHtml(c.text)}</span>
            </div>
        `).join('');
    }

    // main render feed
    function renderFeed() {
        const feedContainer = document.getElementById("postsFeed");
        if (!posts.length) {
            feedContainer.innerHTML = `<div class="empty-feed"><i class="far fa-newspaper"></i> No posts yet. Create the first one!</div>`;
            return;
        }

        feedContainer.innerHTML = posts.map(post => {
            const userLiked = post.likedBy && post.likedBy.includes(currentUserId);
            return `
            <div class="post-card" data-post-id="${post.id}">
                <div class="post-header">
                    <div class="post-avatar"><i class="fas fa-user-astronaut"></i></div>
                    <div class="post-user-info">
                        <div class="post-username">${escapeHtml(post.authorName)}</div>
                        <div class="post-time">${escapeHtml(post.timestamp)}</div>
                    </div>
                    <button class="delete-post" data-id="${post.id}" title="Delete post"><i class="fas fa-trash-alt"></i></button>
                </div>
                <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                ${post.mediaURL ? `
                    <div class="post-media">
                        ${post.mediaType === 'image' ? `<img src="${post.mediaURL}" alt="post media" loading="lazy">` : 
                          post.mediaType === 'video' ? `<video controls src="${post.mediaURL}" style="max-width:100%"></video>` : ''}
                    </div>
                ` : ''}
                <div class="action-bar">
                    <button class="action-btn like-button ${userLiked ? 'liked' : ''}" data-id="${post.id}">
                        <i class="fa-${userLiked ? 'solid' : 'regular'} fa-heart"></i> 
                        <span class="like-count">${post.likes || 0}</span> Likes
                    </button>
                    <button class="action-btn toggle-comments" data-id="${post.id}">
                        <i class="far fa-comment-dots"></i> Comments (${post.comments?.length || 0})
                    </button>
                </div>
                <div class="comments-area" id="commentsArea-${post.id}" style="display: none;">
                    <div class="comment-list" id="commentList-${post.id}">
                        ${renderCommentsList(post.comments || [])}
                    </div>
                    <div class="add-comment-form">
                        <input type="text" class="comment-input" id="commentInput-${post.id}" placeholder="Write a comment...">
                        <button class="comment-submit" data-id="${post.id}">Post</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        // attach like event
        document.querySelectorAll('.like-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const postId = parseInt(btn.getAttribute('data-id'));
                handleLikeToggle(postId);
            });
        });
        // attach comment toggle
        document.querySelectorAll('.toggle-comments').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = parseInt(btn.getAttribute('data-id'));
                const commentsDiv = document.getElementById(`commentsArea-${postId}`);
                if (commentsDiv.style.display === 'none') commentsDiv.style.display = 'block';
                else commentsDiv.style.display = 'none';
            });
        });
        // attach comment submit
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = parseInt(btn.getAttribute('data-id'));
                const inputField = document.getElementById(`commentInput-${postId}`);
                const commentText = inputField.value.trim();
                if (commentText) {
                    addCommentToPost(postId, commentText);
                    inputField.value = '';
                } else alert("Please write a comment.");
            });
        });
        // delete post
        document.querySelectorAll('.delete-post').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const postId = parseInt(btn.getAttribute('data-id'));
                if (confirm("Delete this post permanently?")) {
                    posts = posts.filter(p => p.id !== postId);
                    persistPosts();
                    renderFeed();
                    updatePostCounter();
                }
            });
        });
    }

    function handleLikeToggle(postId) {
        const postIndex = posts.findIndex(p => p.id === postId);
        if (postIndex === -1) return;
        const post = posts[postIndex];
        if (!post.likedBy) post.likedBy = [];
        const alreadyLiked = post.likedBy.includes(currentUserId);
        if (alreadyLiked) {
            post.likes = Math.max(0, post.likes - 1);
            post.likedBy = post.likedBy.filter(uid => uid !== currentUserId);
        } else {
            post.likes = (post.likes || 0) + 1;
            post.likedBy.push(currentUserId);
        }
        persistPosts();
        renderFeed();  // re-render to update UI
    }

    function addCommentToPost(postId, commentText) {
        const post = posts.find(p => p.id === postId);
        if (!post) return;
        if (!post.comments) post.comments = [];
        const newComment = {
            author: getRandomName(),
            text: commentText.substring(0, 200),
            timestamp: Date.now()
        };
        post.comments.push(newComment);
        persistPosts();
        renderFeed();
        // automatically expand comments section
        const commentsDiv = document.getElementById(`commentsArea-${postId}`);
        if (commentsDiv) commentsDiv.style.display = 'block';
    }

    // ------- MEDIA UPLOAD & PREVIEW -------
    let currentMediaFile = null;
    let currentMediaType = null;   // 'image' or 'video'
    let currentMediaURL = null;

    const photoInput = document.getElementById("photoUpload");
    const videoInput = document.getElementById("videoUploadFile");
    const previewContainer = document.getElementById("mediaPreview");

    function clearMediaPreview() {
        previewContainer.innerHTML = '';
        currentMediaFile = null;
        currentMediaType = null;
        currentMediaURL = null;
    }

    function showPreview(file, type) {
        clearMediaPreview();
        const reader = new FileReader();
        reader.onload = function(e) {
            currentMediaURL = e.target.result;
            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-item';
            if (type === 'image') {
                const img = document.createElement('img');
                img.src = e.target.result;
                previewDiv.appendChild(img);
            } else if (type === 'video') {
                const vid = document.createElement('video');
                vid.src = e.target.result;
                vid.controls = true;
                vid.style.maxHeight = '140px';
                previewDiv.appendChild(vid);
            }
            const removeBtn = document.createElement('div');
            removeBtn.className = 'remove-preview';
            removeBtn.innerHTML = '<i class="fas fa-times-circle"></i>';
            removeBtn.onclick = () => clearMediaPreview();
            previewDiv.appendChild(removeBtn);
            previewContainer.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
        currentMediaFile = file;
        currentMediaType = type;
    }

    photoInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            if (file.type.startsWith('image/')) {
                showPreview(file, 'image');
            } else alert("Please select a valid image.");
        }
        photoInput.value = '';
    });

    videoInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            if (file.type.startsWith('video/')) {
                showPreview(file, 'video');
            } else alert("Please select a valid video (mp4, webm).");
        }
        videoInput.value = '';
    });

    // Publish post logic
    document.getElementById("publishPost").addEventListener("click", () => {
        const postText = document.getElementById("postContent").value.trim();
        if (!postText && !currentMediaURL) {
            alert("Please write something or add a photo/video.");
            return;
        }
        const newPost = {
            id: Date.now(),
            text: postText || "📎 Shared media",
            mediaType: currentMediaType,
            mediaURL: currentMediaURL,
            likes: 0,
            likedBy: [],
            comments: [],
            timestamp: new Date().toLocaleString(),
            authorName: getRandomName(),
        };
        posts.unshift(newPost);
        persistPosts();
        // reset form
        document.getElementById("postContent").value = '';
        clearMediaPreview();
        renderFeed();
        updatePostCounter();
        // scroll to top to see new post
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Global reset all data
    document.getElementById("globalClearBtn").addEventListener("click", () => {
        if (confirm("⚠️ WARNING: This will delete ALL posts, comments and likes permanently. This action cannot be undone. Continue?")) {
            posts = [];
            persistPosts();
            // optional re-add a welcome seed post
            posts = [{
                id: Date.now(),
                text: "✨ Fresh start! Create new posts, add images or videos. All data saved automatically.",
                mediaType: null,
                mediaURL: null,
                likes: 1,
                likedBy: [currentUserId],
                comments: [],
                timestamp: new Date().toLocaleString(),
                authorName: "SocialCanvas"
            }];
            persistPosts();
            renderFeed();
            updatePostCounter();
            clearMediaPreview();
            document.getElementById("postContent").value = '';
        }
    });

    // ---------- INITIAL LOAD ----------
    loadPostsFromStorage();

    // explanation: what you need to save the posted data
    console.log("=== DATA PERSISTENCE EXPLANATION ===");
    console.log("To save all posted data, this application uses browser's localStorage API.");
    console.log("Required data structure for each post:");
    console.log("  - id: unique identifier (number)");
    console.log("  - text: post content (string)");
    console.log("  - mediaType: 'image', 'video' or null");
    console.log("  - mediaURL: base64 data URL or null (stores image/video inline)");
    console.log("  - likes: number of likes");
    console.log("  - likedBy: array of user IDs (to prevent duplicate likes)");
    console.log("  - comments: array of objects { author, text, timestamp }");
